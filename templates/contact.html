{% extends 'base.html' %} {% block title %}Contact - My Flask Site{% endblock %}
{% block content %}
<div class="container py-5">
  <h1 class="text-center mb-5" style="color: #ffffff;">Contact Us</h1>

  <div class="row">
    <!-- Map Column -->
    <div class="col-lg-6 mb-4">
      <div class="map-container">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3310.8108488497414!2d151.1582788755762!3d-33.920267473206934!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6b12b08afb16153d%3A0xbd21d225e980c8aa!2sTempe%20High%20School!5e0!3m2!1sen!2sau!4v1782256352694!5m2!1sen!2sau"
          width="100%"
          height="400"
          style="border: 0"
          allowfullscreen=""
          loading="lazy"
        >
        </iframe>
      </div>

      <!-- Contact Info (moved below map) -->
      <div class="contact-info mt-4">
        <h4 style="color: #ffffff;">Other Ways to Reach Us</h4>
        <ul class="list-unstyled mb-0">
          <li class="mb-2">
            <strong>📍</strong><h4 style="color: #ffffff;"> 123 Main Street, Sydney, NSW 2000</h4>
          </li>
          <li class="mb-2"><strong>📞</strong><h4 style="color: #ffffff;">(02) 1234 5678</h4></li>
          <li>
            <strong>✉️</strong>
            <a href="mailto:info@myflasksite.com">info@myflasksite.com</a>
          </li>
        </ul>
      </div>
    </div>

    <!-- Form Column -->
    <div class="col-lg-6 mb-4">
      <div class="contact-form">
        <h4 class="mb-4" style="color: #ffffff;">Send us a Message</h4>

        <form action="#" method="POST">
          <!-- Name Field -->
          <div class="mb-3">
            <style>
              #name::placeholder {
                color: #ffffff;
                opacity: 1;
              }
          </style>
          <label for="name" class="form-label" style="color: #ffffff;">
            Your Name <span style="color: #ff4655;">*</span>
          </label>
          <input
            type="text"
            class="form-control"
            id="name"
            name="name"
            placeholder="Ibuki Seki"
            style="background-color: #ff4655; color: #ffffff !important; border-color: #ff4655;"
            required
          />
        </div>

          <!-- Email Field -->
          <div class="mb-3"> 
            <style>
              #email::placeholder {
                color: #ffffff;
                opacity: 1;
              }
            </style>
            <label for="email" class="form-label" style="color: #ffffff;">
              Email Address <span style="color: #ff4655;">*</span>
            </label>
            <input
              type="email" 
              class="form-control" 
              id="email" 
              name="email" 
              placeholder="Ibuki.Sek1@gmail.com" 
              style="color: #ffffff !important; background-color: #FF4655; border-color: #FF4655;" 
              required 
              /> 
            </div>

<!-- Subject Field -->
          <div class="mb-3"> 
              <label for="subject" class="form-label" style="color: #ffffff !important; font-weight: 600;">Subject</label> 
              <select class="form-select" id="subject" name="subject" style="background-color: #FF4655; color: #ffffff !important;">
                <option value="" style="color: #ffffff !important; background-color: #FF4655;" selected>Choose a topic...</option>
                <option value="general" style="color: #ffffff !important; background-color: #FF4655;">General Inquiry</option>
                <option value="support" style="color: #ffffff !important; background-color: #FF4655;">Support</option>
                <option value="feedback" style="color: #ffffff !important; background-color: #FF4655;">Feedback</option>
                <option value="other" style="color: #ffffff !important; background-color: #FF4655;">Other</option>
            </select> 
        </div>

          <!-- Message Field -->
          <div class="mb-3">
            <style>
              #message::placeholder {
                color: #ffffff;
                opacity: 1;
              }
            </style>
            <label for="message" class="form-label" style="color: #ffffff;">Message<span style="color: #ff4655;">*</span>
            </label>
            <textarea 
              class="form-control" 
              id="message" 
              name="message" 
              rows="5" 
              placeholder="How can we help you?" 
              required 
              style="background-color: #ff4655; color: #ffffff; border-color: #ff4655;"
            ></textarea>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn btn-lg w-100" style="background-color: #FF4655; color: white;">Submit</button>
            Send Message
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
